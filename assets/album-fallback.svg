<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — album-art fallback served from `/art/{id}` when no embedded
     picture or folder image is available. Lucide-music (♫) base, tuned for
     this frame: the beam uses lucide's stroke spec, but the note heads are
     solid-filled at r=2.2 (lucide's r=3 would inherit the group stroke and
     push outer-r to 4, making the heads visibly larger than the beam can
     anchor). Same translate+scale transform as cat-played so the lucide
     24-unit icon fits the 120 frame with consistent breathing room. No
     orange accent — orange in revolver's icon language is the "action
     verb" colour, and a missing-art placeholder is passive. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

<g transform="translate(55 60) scale(3.556) translate(-12 -12)">
  <!-- Beam — same shortening, but thinner -->
  <path d="M 9.2 4.97 L 20.85 3.16"
        fill="none" stroke="#161616" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 9 18 V 5"
        fill="none" stroke="#161616" stroke-width="1.3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 21 16 V 3"
        fill="none" stroke="#161616" stroke-width="1.3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="6.72" cy="18.5" rx="3" ry="2.5"
           transform="rotate(-20 6.5 18.5)"
           fill="#161616"/>
  <ellipse cx="18.715" cy="16.5" rx="3" ry="2.5"
           transform="rotate(-20 18.5 16.5)"
           fill="#161616"/>
</g>
</svg>
