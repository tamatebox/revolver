<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:aa` (Album Artist). Single clean person silhouette + a smaller orange star badge on the chest (lapel-pin sized, not parade-uniform). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Single person silhouette — head sits flush on the shoulder arch -->
  <g fill="#161616">
    <circle cx="60" cy="44" r="16"/>
    <path d="M 22 100
             C 22 64, 98 64, 98 100 Z"/>
  </g>

  <!-- Lapel-pin sized orange star (~50% of the previous size). -->
  <g transform="translate(60 85) scale(0.5)">
    <path d="M 0 -12
             L 3.5 -3.7
             L 12.4 -3
             L 5.7 3.1
             L 7.8 11.7
             L 0 7
             L -7.8 11.7
             L -5.7 3.1
             L -12.4 -3
             L -3.5 -3.7 Z"
          fill="#d6651f"/>
  </g>
</svg>
