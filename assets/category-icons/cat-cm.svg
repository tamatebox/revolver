<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:cm` (Composer). Quill writing music — feather above + staff lines below with a single note head. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Staff: 5 horizontal lines across the lower half -->
  <g stroke="#161616" stroke-width="2.5" stroke-linecap="round">
    <line x1="22" y1="78" x2="98" y2="78"/>
    <line x1="22" y1="86" x2="98" y2="86"/>
    <line x1="22" y1="94" x2="98" y2="94"/>
    <line x1="22" y1="102" x2="98" y2="102"/>
    <line x1="22" y1="110" x2="98" y2="110"/>
  </g>

  <!-- Single note head sitting on the staff (composer is writing this note) -->
  <ellipse cx="70" cy="90" rx="6" ry="4.5" fill="#161616" transform="rotate(-20 70 90)"/>

  <!-- Quill: feather body (curved, filled) + shaft tapering down to the note -->
  <g fill="#161616">
    <!-- Feather body (curved blade) -->
    <path d="M 36 14
             C 50 18, 56 28, 56 42
             C 52 38, 46 36, 40 36
             C 46 32, 50 28, 50 24
             C 44 28, 38 30, 34 30
             Z"/>
    <!-- Shaft from feather base down to nib (above note head) -->
    <path d="M 56 42
             L 70 84
             L 66 86
             L 52 44 Z"/>
  </g>

  <!-- Orange ink droplet at the nib -->
  <circle cx="68" cy="84" r="2.5" fill="#d6651f"/>
</svg>
