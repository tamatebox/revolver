<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:mixed` (Mixed Quality). 2x2 quadrant tile showing variety. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- 2x2 grid: each quadrant is a different "quality" treatment -->
  <!-- Top-left: solid black (lossless) -->
  <rect x="22" y="22" width="36" height="36" rx="4" fill="#161616"/>
  <!-- Top-right: diagonal hatching -->
  <rect x="62" y="22" width="36" height="36" rx="4" fill="none" stroke="#161616" stroke-width="3"/>
  <g stroke="#161616" stroke-width="2.5">
    <line x1="66" y1="54" x2="94" y2="26"/>
    <line x1="66" y1="44" x2="84" y2="26"/>
    <line x1="76" y1="54" x2="94" y2="36"/>
  </g>
  <!-- Bottom-left: dot grid (granular) -->
  <rect x="22" y="62" width="36" height="36" rx="4" fill="none" stroke="#161616" stroke-width="3"/>
  <g fill="#161616">
    <circle cx="32" cy="72" r="2.5"/>
    <circle cx="40" cy="72" r="2.5"/>
    <circle cx="48" cy="72" r="2.5"/>
    <circle cx="32" cy="80" r="2.5"/>
    <circle cx="40" cy="80" r="2.5"/>
    <circle cx="48" cy="80" r="2.5"/>
    <circle cx="32" cy="88" r="2.5"/>
    <circle cx="40" cy="88" r="2.5"/>
    <circle cx="48" cy="88" r="2.5"/>
  </g>
  <!-- Bottom-right: orange solid (the "wildcard" / mixed indicator) -->
  <rect x="62" y="62" width="36" height="36" rx="4" fill="#d6651f"/>
</svg>
