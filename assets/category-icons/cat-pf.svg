<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:pf` (Performer). Piano keyboard — universally recognizable as "instrument / performance". -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Piano case (outer black frame, rounded) -->
  <rect x="14" y="28" width="92" height="68" rx="6" fill="#161616"/>

  <!-- White-key bed (cream) -->
  <rect x="18" y="38" width="84" height="54" fill="#ede4d0"/>

  <!-- White-key dividers — 6 thin vertical black lines mark 7 white keys -->
  <g stroke="#161616" stroke-width="2">
    <line x1="30" y1="38" x2="30" y2="92"/>
    <line x1="42" y1="38" x2="42" y2="92"/>
    <line x1="54" y1="38" x2="54" y2="92"/>
    <line x1="66" y1="38" x2="66" y2="92"/>
    <line x1="78" y1="38" x2="78" y2="92"/>
    <line x1="90" y1="38" x2="90" y2="92"/>
  </g>

  <!-- Black keys: classic 2+3 grouping over the upper half of the white-key bed -->
  <g fill="#161616">
    <rect x="25" y="38" width="10" height="32" rx="1"/>
    <rect x="37" y="38" width="10" height="32" rx="1"/>
    <!-- gap -->
    <rect x="61" y="38" width="10" height="32" rx="1"/>
    <rect x="73" y="38" width="10" height="32" rx="1"/>
    <rect x="85" y="38" width="10" height="32" rx="1"/>
  </g>

  <!-- Pressed key (orange highlight) — one black key in the middle group -->
  <rect x="73" y="38" width="10" height="32" rx="1" fill="#d6651f"/>
</svg>
