<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:played` (Recently Played). Centred play triangle + smaller orange counterclockwise badge tucked inside the rounded-corner safe zone (no bleed past the tile edge). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Play triangle, centred -->
  <path d="M 34 38 L 34 90 L 78 64 Z" fill="#161616"/>

  <!-- Orange counterclockwise badge — pulled inward so the arc and the
       arrowhead stay well clear of the upper-right rounded corner. -->
  <path d="M 94 28
           A 14 14 0 1 0 82 44"
        fill="none" stroke="#d6651f" stroke-width="6" stroke-linecap="round"/>
  <path d="M 94 28 L 88 20 L 102 24 Z" fill="#d6651f"/>
</svg>
