<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:random` (Random Albums). Lucide-style shuffle: one full "over" path + two "under" stubs (no halo trick). Strokes and chevrons tightened to leave more cream breathing room around the marks. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <g fill="none" stroke="#161616" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- "Over" arrow — one continuous path from lower-left to upper-right -->
    <path d="M 20 86
             h 7
             a 16 16 0 0 0 13.2 -6.8
             l 21.8 -34.4
             a 16 16 0 0 1 13.2 -6.8
             H 96"/>
    <!-- Chevron arrowhead at upper-right -->
    <path d="m 84 24 14 14 -14 14"/>

    <!-- "Under" arrow — two stubs so the crossing reads as "passes under" -->
    <!-- Left stub (upper-left entry) -->
    <path d="M 20 38
             h 7
             a 16 16 0 0 1 14 9"/>
    <!-- Right stub (lower-right exit) -->
    <path d="M 96 86
             H 75
             a 16 16 0 0 1 -13.2 -7.2
             l -1.6 -2"/>
  </g>
  <!-- Orange chevron at lower-right -->
  <path d="m 84 72 14 14 -14 14"
        fill="none" stroke="#d6651f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
