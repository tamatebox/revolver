<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:random` (Random Albums). Crossing shuffle arrows. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Upper arrow: left → right, curves down through the middle -->
  <path d="M 22 40 H 42 C 60 40 60 80 78 80"
        fill="none" stroke="#161616" stroke-width="7" stroke-linecap="round"/>
  <!-- Arrowhead pointing right -->
  <path d="M 78 80 L 70 74 L 70 86 Z" fill="#161616"/>

  <!-- Lower arrow: left → right, curves up through the middle -->
  <path d="M 22 80 H 42 C 60 80 60 40 78 40"
        fill="none" stroke="#161616" stroke-width="7" stroke-linecap="round"/>
  <!-- Orange arrowhead pointing right -->
  <path d="M 78 40 L 70 34 L 70 46 Z" fill="#d6651f"/>
</svg>
