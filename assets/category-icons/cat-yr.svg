<?xml version="1.0" encoding="UTF-8"?>
<!-- revolver — category icon for `cat:yr` (Year). Calendar with one highlighted date. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="geometricPrecision">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>

  <!-- Calendar body -->
  <rect x="22" y="30" width="76" height="68" rx="6" fill="#161616"/>
  <!-- Header band (slightly inset, cream) -->
  <rect x="28" y="42" width="64" height="50" rx="3" fill="#ede4d0"/>
  <!-- Two binding rings sticking up from the top edge -->
  <rect x="36" y="22" width="6" height="16" rx="3" fill="#161616"/>
  <rect x="78" y="22" width="6" height="16" rx="3" fill="#161616"/>

  <!-- Dot grid (3x3) for dates -->
  <g fill="#161616">
    <circle cx="40" cy="56" r="3"/>
    <circle cx="60" cy="56" r="3"/>
    <circle cx="80" cy="56" r="3"/>
    <circle cx="40" cy="70" r="3"/>
    <circle cx="80" cy="70" r="3"/>
    <circle cx="40" cy="84" r="3"/>
    <circle cx="60" cy="84" r="3"/>
    <circle cx="80" cy="84" r="3"/>
  </g>
  <!-- Highlighted "today" date (orange, center) -->
  <circle cx="60" cy="70" r="5" fill="#d6651f"/>
</svg>
