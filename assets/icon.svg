<?xml version="1.0" encoding="UTF-8"?>
<!--
  revolver — UPnP MediaServer icon.
  Rounded-square cream tile + black vinyl disc with grooves + warm orange
  center label. Stays legible on light and dark backgrounds because the tile
  itself carries the silhouette. Original geometric design.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect x="2" y="2" width="116" height="116" rx="24" fill="#ede4d0"/>
  <rect x="2" y="2" width="116" height="116" rx="24" fill="none" stroke="#c8bea4" stroke-width="0.8"/>
  <circle cx="60" cy="60" r="44" fill="#161616"/>
  <g fill="none" stroke="#3a3a3a" stroke-width="0.5" opacity="0.9">
    <circle cx="60" cy="60" r="40"/>
    <circle cx="60" cy="60" r="36"/>
    <circle cx="60" cy="60" r="32"/>
    <circle cx="60" cy="60" r="28"/>
    <circle cx="60" cy="60" r="24"/>
    <circle cx="60" cy="60" r="20"/>
  </g>
  <circle cx="60" cy="60" r="16" fill="#d6651f"/>
  <circle cx="60" cy="60" r="16" fill="none" stroke="#7d3a13" stroke-width="0.5"/>
  <circle cx="60" cy="60" r="2" fill="#161616"/>
</svg>
