<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <title>revolver admin</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --muted: #6b7280;
      --text: #1f2937;
      --text-strong: #0f172a;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-soft: #eff6ff;
      --danger: #b91c1c;
      --warning: #f59e0b;
      --code-bg: #f3f4f6;
      --pill-warning-bg: #fef3c7;
      --pill-warning-fg: #92400e;
      --pill-danger-bg: #fee2e2;
      --pill-danger-fg: #991b1b;
      --hidden-bg: rgba(15, 23, 42, 0.025);
      --row-hover: #f9fafb;
      --toggle-off: #cbd5e1;
      --focus-ring: rgba(37, 99, 235, 0.22);
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03);
      --radius: 10px;
      --radius-sm: 6px;
      color-scheme: light;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --card: #131c2e;
        --border: #1f2a3f;
        --border-strong: #334155;
        --muted: #94a3b8;
        --text: #e5e7eb;
        --text-strong: #f9fafb;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --accent-soft: rgba(96, 165, 250, 0.15);
        --danger: #f87171;
        --warning: #fbbf24;
        --code-bg: #0b1220;
        --pill-warning-bg: rgba(251, 191, 36, 0.18);
        --pill-warning-fg: #fcd34d;
        --pill-danger-bg: rgba(248, 113, 113, 0.18);
        --pill-danger-fg: #fca5a5;
        --hidden-bg: rgba(255, 255, 255, 0.03);
        --row-hover: rgba(255, 255, 255, 0.04);
        --toggle-off: #475569;
        --focus-ring: rgba(96, 165, 250, 0.35);
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4), 0 1px 1px rgba(0, 0, 0, 0.2);
        color-scheme: dark;
      }
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      max-width: 880px;
      margin: 2em auto;
      padding: 0 1.25em;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      margin: 0 0 1em;
      font-size: 1.6em;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-strong);
    }
    /* Card title: bold, normal-size, dark. The card's identity. */
    h2 {
      margin: 0 0 0.9em;
      font-size: 1em;
      color: var(--text-strong);
      font-weight: 600;
      letter-spacing: -0.005em;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25em 1.5em;
      margin-bottom: 1em;
      box-shadow: var(--shadow-sm);
    }
    .grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.4em 1.5em;
      font-variant-numeric: tabular-nums;
    }
    .grid > div:nth-child(odd) { color: var(--muted); }
    button {
      padding: 0.5em 1.1em;
      margin-right: 0.5em;
      cursor: pointer;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: var(--radius-sm);
      font: inherit;
      font-size: 0.95em;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover:not(:disabled) { background: var(--accent); color: white; }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Primary action: rescan + save changes. */
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: white;
    }
    pre {
      background: var(--code-bg);
      padding: 1em;
      border-radius: var(--radius-sm);
      overflow: auto;
      max-height: 400px;
      font-size: 0.85em;
      margin-top: 0.75em;
      color: var(--text);
    }
    .status { color: var(--muted); font-size: 0.85em; margin-left: 0.5em; }
    .status.error { color: var(--danger); }

    /* Settings form */
    .settings-section { margin-bottom: 1.5em; }
    .settings-section:last-child { margin-bottom: 0.5em; }
    /* Sub-section heading within a card: small caps, muted. */
    .settings-section h3 {
      margin: 0.5em 0 0.4em;
      font-size: 0.72em;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }
    /* Row: relative-positioned so the modified-state bar (::before) can sit
       at the left edge instead of the tiny dot the old design used. */
    .settings-row {
      display: grid;
      grid-template-columns: minmax(11em, 16em) minmax(0, 1fr) auto;
      gap: 0.35em 1em;
      align-items: center;
      padding: 0.7em 0.5em 0.7em 0.75em;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .settings-row::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.65em;
      bottom: 0.65em;
      width: 3px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.15s ease;
    }
    .settings-row.user-source::before { background: var(--accent); }
    .settings-row.dirty::before { background: var(--warning); }
    .settings-row:last-child { border-bottom: none; }
    .settings-row.row-array { align-items: start; }
    .settings-row.row-array .settings-key { padding-top: 0.3em; }
    .settings-key {
      display: flex;
      align-items: center;
      gap: 0.4em;
      font-weight: 500;
      color: var(--text-strong);
    }
    /* The bar (::before on .settings-row) replaces this dot. The JS still
       emits the element for now; keeping it hidden avoids touching the
       render path. */
    .modified-dot { display: none; }
    .settings-input {
      width: 100%;
      padding: 0.4em 0.6em;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      font: inherit;
      background: var(--card);
      color: var(--text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .settings-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    /* Boolean settings render as a toggle switch, right-aligned within the
       input column so it sits visually close to the reset button (iOS-style). */
    .settings-input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 2.4em;
      height: 1.35em;
      background: var(--toggle-off);
      border: none;
      border-radius: 999px;
      padding: 0;
      margin: 0;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      justify-self: end;
      transition: background 0.15s ease;
    }
    .settings-input[type="checkbox"]::before {
      content: "";
      position: absolute;
      top: 0.15em;
      left: 0.15em;
      width: 1.05em;
      height: 1.05em;
      background: white;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      transition: transform 0.15s ease;
    }
    .settings-input[type="checkbox"]:checked { background: var(--accent); }
    .settings-input[type="checkbox"]:checked::before { transform: translateX(1.05em); }
    .settings-input[type="checkbox"]:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--focus-ring);
    }
    .reset-link {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.25em 0.5em;
      margin: 0;
      cursor: pointer;
      font: inherit;
      font-size: 0.85em;
      border-radius: var(--radius-sm);
      transition: color 0.15s ease, background 0.15s ease;
    }
    .reset-link:hover:not(:disabled) {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .reset-link:disabled { opacity: 0.3; cursor: not-allowed; }
    /* Hint aligns under the input column, not under the label. */
    .settings-hint {
      grid-column: 2 / -1;
      font-size: 0.82em;
      color: var(--muted);
      line-height: 1.45;
    }
    /* tier-note rendered as a pill badge with severity color so reload /
       restart consequences are visible at a glance. */
    .tier-note {
      display: inline-block;
      padding: 0.1em 0.6em;
      margin-left: 0.5em;
      border-radius: 999px;
      font-size: 0.88em;
      font-weight: 600;
      letter-spacing: 0.01em;
      vertical-align: 1px;
    }
    .tier-note.tier-reload {
      background: var(--pill-warning-bg);
      color: var(--pill-warning-fg);
    }
    .tier-note.tier-restart {
      background: var(--pill-danger-bg);
      color: var(--pill-danger-fg);
    }

    /* Array-valued control (browse.top_level) */
    .array-control {
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 0.4em 0.5em;
      background: var(--card);
      overflow: hidden;
    }
    .array-group-label {
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 0.3em 0 0.25em;
      font-weight: 600;
    }
    .array-list {
      display: flex;
      flex-direction: column;
    }
    .array-item {
      display: grid;
      /* The trailing 1fr column absorbs leftover row width so move-btns
         (justify-self: end below) snaps to the right edge regardless of
         how long the label happens to be. */
      grid-template-columns: auto auto auto 1fr;
      align-items: center;
      gap: 0.4em;
      padding: 0.3em 0.35em;
      font-size: 0.9em;
      border: 1px solid transparent;
      border-radius: 4px;
    }
    .array-item input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }
    .array-item.draggable { cursor: grab; }
    .array-item.draggable:hover { background: var(--row-hover); }
    .array-item.draggable:active { cursor: grabbing; }
    .array-item.dragging { opacity: 0.4; }
    .array-item.drop-before { border-top-color: var(--accent); }
    .array-item.drop-after { border-bottom-color: var(--accent); }
    .array-item.unknown .array-item-label {
      color: var(--danger);
      font-style: italic;
    }
    /* Up / down buttons — only shown on touch devices (where HTML5
       drag-and-drop doesn't fire). On desktop the drag-handle is the
       sole reorder affordance. */
    .move-btns {
      display: none;
      gap: 0.15em;
      justify-self: end;
    }
    .move-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.1em 0.4em;
      margin: 0;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: 400;
      line-height: 1.2;
      min-width: 1.6em;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .move-btn:hover:not(:disabled) {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .move-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    /* Hidden categories live in a subtly-tinted sub-area to differentiate
       them from the active set without adding cognitive noise. */
    .array-section-hidden {
      background: var(--hidden-bg);
      margin: 0.5em -0.5em -0.4em;
      padding: 0.4em 0.5em 0.5em;
      border-top: 1px solid var(--border);
    }
    .array-section-hidden .array-item-label {
      color: var(--muted);
    }
    .drag-handle {
      color: var(--muted);
      font-size: 1em;
      line-height: 1;
      user-select: none;
    }
    .array-empty {
      font-size: 0.8em;
      color: var(--muted);
      font-style: italic;
      padding: 0.2em 0;
    }

    /* Narrow viewports: stack each settings row vertically so the fixed
       label column doesn't overflow on phones. */
    @media (max-width: 640px) {
      body {
        margin: 1em auto;
        padding: 0 0.75em;
      }
      h1 { font-size: 1.35em; }
      .card {
        padding: 1em;
        border-radius: 8px;
      }
      .settings-row {
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "key reset"
          "ctrl ctrl"
          "hint hint";
        gap: 0.4em 0.5em;
        padding: 0.8em 0.5em 0.8em 0.75em;
      }
      .settings-row > .settings-key { grid-area: key; }
      .settings-row > .reset-link { grid-area: reset; align-self: start; }
      .settings-row > .settings-input,
      .settings-row > .array-control { grid-area: ctrl; }
      .settings-row > .settings-hint { grid-area: hint; }
      .settings-row.row-array .settings-key { padding-top: 0; }
      .settings-input[type="checkbox"] { justify-self: start; }
      button {
        margin-right: 0.3em;
        margin-bottom: 0.4em;
      }
      /* Drag handle does nothing on touch — hide it and rely on ↑/↓ buttons. */
      .drag-handle { display: none; }
      .array-item.draggable { cursor: default; }
      .move-btns { display: flex; }
      .move-btn {
        padding: 0.35em 0.7em;
        font-size: 0.9em;
        min-width: 2.2em;
      }
      .move-btn:not(:disabled):active {
        background: var(--accent-soft);
        color: var(--accent);
      }
    }
  </style>
</head>
<body>
  <h1>revolver <span class="status" id="poll-status">loading…</span></h1>

  <div class="card">
    <h2>Library</h2>
    <div class="grid">
      <div>Albums</div><div id="albums-total">–</div>
      <div>Tracks</div><div id="tracks-total">–</div>
      <div>Total duration</div><div id="total-duration">–</div>
      <div>Plays total</div><div id="plays-total">–</div>
      <div>Played albums</div><div id="played-albums-total">–</div>
    </div>
  </div>

  <div class="card">
    <h2>Quality breakdown</h2>
    <div class="grid" id="quality-grid"></div>
  </div>

  <div class="card">
    <h2>Server</h2>
    <div class="grid">
      <div>system_update_id</div><div id="system-update-id">–</div>
      <div>Uptime</div><div id="uptime">–</div>
      <div>Last scan</div><div id="last-scan">–</div>
    </div>
  </div>

  <div class="card">
    <h2>Settings</h2>
    <div id="settings-form">loading…</div>
    <button id="btn-save-settings" class="btn-primary" disabled>Save changes</button>
    <span class="status" id="settings-status"></span>
  </div>

  <div class="card">
    <h2>Actions</h2>
    <button id="btn-rescan" class="btn-primary">Rescan library</button>
    <button id="btn-reshuffle">Reshuffle random albums</button>
    <button id="btn-show-report">Show last scan report</button>
    <span class="status" id="action-status"></span>
    <pre id="last-action-output" hidden></pre>
  </div>

  <script>
    // Poll GET /admin/stats every 5 seconds and refresh the DOM.
    // scan / reshuffle / scan-report just call the existing admin endpoints (SPEC §8.4).
    const POLL_INTERVAL_MS = 5000;

    function fmtDuration(ms) {
      if (ms == null) return "–";
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) return `${h}h ${m}m ${s}s`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function fmtUptimeSeconds(sec) {
      if (sec == null) return "–";
      return fmtDuration(sec * 1000);
    }

    function fmtUnixTime(t) {
      if (!t) return "–";
      const d = new Date(t * 1000);
      return d.toLocaleString();
    }

    async function fetchStats() {
      const ps = document.getElementById("poll-status");
      try {
        const resp = await fetch("/admin/stats");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const v = await resp.json();
        document.getElementById("albums-total").textContent = v.albums_total;
        document.getElementById("tracks-total").textContent = v.tracks_total;
        document.getElementById("total-duration").textContent = fmtDuration(v.total_duration_ms);
        document.getElementById("plays-total").textContent = v.plays_total;
        document.getElementById("played-albums-total").textContent = v.played_albums_total;
        document.getElementById("system-update-id").textContent = v.system_update_id;
        document.getElementById("uptime").textContent = fmtUptimeSeconds(v.uptime_seconds);
        if (v.last_scan) {
          document.getElementById("last-scan").textContent =
            `${fmtUnixTime(v.last_scan.completed_at)} (${v.last_scan.scan_id.slice(0, 8)}…)`;
        } else {
          document.getElementById("last-scan").textContent = "never";
        }
        // Render quality_breakdown in a fixed order.
        const qg = document.getElementById("quality-grid");
        qg.innerHTML = "";
        for (const key of ["hires", "lossless", "lossy", "mixed", "unknown"]) {
          const label = document.createElement("div");
          label.textContent = key;
          const val = document.createElement("div");
          val.textContent = v.quality_breakdown[key] ?? 0;
          qg.appendChild(label);
          qg.appendChild(val);
        }
        ps.textContent = `updated ${new Date().toLocaleTimeString()}`;
        ps.classList.remove("error");
      } catch (e) {
        ps.textContent = `error: ${e.message}`;
        ps.classList.add("error");
      }
    }

    async function postAction(button, url, label) {
      const status = document.getElementById("action-status");
      button.disabled = true;
      status.textContent = `${label}…`;
      status.classList.remove("error");
      try {
        const resp = await fetch(url, { method: "POST" });
        const body = await resp.text();
        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${body}`);
        status.textContent = `${label} ok`;
        // Refresh stats immediately on success (scan changes last_scan / counts).
        fetchStats();
      } catch (e) {
        status.textContent = `${label} failed: ${e.message}`;
        status.classList.add("error");
      } finally {
        button.disabled = false;
      }
    }

    async function toggleScanReport(button) {
      const out = document.getElementById("last-action-output");
      const status = document.getElementById("action-status");
      // Already visible → hide and stop here.
      if (!out.hidden) {
        out.hidden = true;
        out.textContent = "";
        status.textContent = "";
        button.textContent = "Show last scan report";
        return;
      }
      status.textContent = "loading scan report…";
      status.classList.remove("error");
      try {
        const resp = await fetch("/admin/scan-report");
        if (resp.status === 404) {
          out.textContent = "(no scan run yet)";
        } else if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        } else {
          const json = await resp.json();
          out.textContent = JSON.stringify(json, null, 2);
        }
        out.hidden = false;
        status.textContent = "";
        button.textContent = "Hide last scan report";
      } catch (e) {
        status.textContent = `report fetch failed: ${e.message}`;
        status.classList.add("error");
      }
    }

    // Rescan is async (#18): POST returns 202 immediately, then we poll
    // /admin/scan-progress until phase returns to "idle".
    async function rescan(button) {
      const status = document.getElementById("action-status");
      button.disabled = true;
      status.classList.remove("error");
      status.textContent = "rescan…";
      try {
        const resp = await fetch("/admin/rescan", { method: "POST" });
        if (resp.status === 202 || resp.status === 409) {
          // 409 = a scan is already running (e.g. triggered by another caller
          // or by an rsync post-hook). Treat that as "OK, just observe it".
          await pollScanProgress(status);
          status.textContent = "rescan complete";
          fetchStats();
        } else {
          const body = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${body}`);
        }
      } catch (e) {
        status.textContent = `rescan failed: ${e.message}`;
        status.classList.add("error");
      } finally {
        button.disabled = false;
      }
    }

    async function pollScanProgress(status) {
      // 1.5s polling cadence — fast enough to feel live, slow enough not to
      // hammer SQLite during the scan (each poll is just an atomic load + JSON
      // serialize, so it's cheap, but matching the ticker log interval is fine).
      const POLL_MS = 1500;
      // Give the spawn a beat to flip phase off "idle" before we conclude.
      await new Promise((r) => setTimeout(r, 200));
      while (true) {
        let snap;
        try {
          const resp = await fetch("/admin/scan-progress");
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          snap = await resp.json();
        } catch (e) {
          status.textContent = `progress poll failed: ${e.message}`;
          throw e;
        }
        if (snap.phase === "idle") return;
        const pct = snap.total > 0
          ? ` (${Math.floor((snap.current * 100) / snap.total)}%)`
          : "";
        const counts = snap.total > 0 ? ` ${snap.current}/${snap.total}` : "";
        status.textContent = `rescan: ${snap.phase}${counts}${pct}`;
        await new Promise((r) => setTimeout(r, POLL_MS));
      }
    }

    document.getElementById("btn-rescan").addEventListener("click", (e) => {
      rescan(e.currentTarget);
    });
    document.getElementById("btn-reshuffle").addEventListener("click", (e) => {
      postAction(e.currentTarget, "/admin/reshuffle", "reshuffle");
    });
    document.getElementById("btn-show-report").addEventListener("click", (e) => {
      toggleScanReport(e.currentTarget);
    });

    // ── Settings (#14) ───────────────────────────────────────────────────
    // Each row keeps its initial value so we can compute the diff at Save
    // time and POST only the keys that actually changed. The `current`
    // value is always read from `state.current` — for scalar inputs the
    // input event handler writes it, for the array control the
    // reorder/toggle handlers write it directly.
    const settingsState = new Map();

    // Friendlier section titles. New keys can be added without
    // touching the rest of the UI.
    const SECTION_TITLES = {
      browse: "Browse",
    };
    function sectionTitle(name) {
      return SECTION_TITLES[name] ?? (name.charAt(0).toUpperCase() + name.slice(1));
    }

    function inferType(entry) {
      // Closed option list → ordered set widget.
      if (Array.isArray(entry.choices)) return "array";
      const { value, default: defaultValue } = entry;
      if (typeof value === "boolean" || typeof defaultValue === "boolean") return "bool";
      if (value === null || defaultValue === null) return "nullable-number";
      if (typeof value === "number") return "number";
      return "text";
    }

    function tierNote(tier) {
      if (tier === "reload") return "Saving will trigger a rescan.";
      if (tier === "restart") return "Takes effect after server restart.";
      return null;
    }

    function valueEqual(a, b) {
      if (a === undefined) a = null;
      if (b === undefined) b = null;
      if (Array.isArray(a) && Array.isArray(b)) {
        return a.length === b.length && a.every((v, i) => v === b[i]);
      }
      return a === b;
    }

    function refreshDirty() {
      let anyDirty = false;
      for (const state of settingsState.values()) {
        const isDirty = !valueEqual(state.current, state.initial);
        state.row.classList.toggle("dirty", isDirty);
        anyDirty = anyDirty || isDirty;
        // Reset button is enabled whenever the current value differs from
        // the default — including locally-edited default rows that aren't
        // yet saved. Clicking it only updates the input value; Save commits.
        if (state.resetBtn) {
          state.resetBtn.disabled = valueEqual(state.current, state.default);
        }
      }
      document.getElementById("btn-save-settings").disabled = !anyDirty;
    }

    function buildScalarInput(state, entry) {
      const input = document.createElement("input");
      input.className = "settings-input";
      if (state.type === "bool") {
        input.type = "checkbox";
        input.checked = !!entry.value;
      } else if (state.type === "number" || state.type === "nullable-number") {
        input.type = "number";
        input.min = "1";
        input.value = entry.value === null || entry.value === undefined ? "" : String(entry.value);
        if (state.type === "nullable-number") {
          input.placeholder = "(empty = no limit)";
        }
      } else {
        input.type = "text";
        input.value = entry.value === null ? "" : String(entry.value);
      }
      const read = () => {
        if (state.type === "bool") return input.checked;
        const raw = input.value.trim();
        if (state.type === "nullable-number") return raw === "" ? null : Number(raw);
        if (state.type === "number") return raw === "" ? null : Number(raw);
        return raw;
      };
      const onChange = () => {
        state.current = read();
        refreshDirty();
      };
      input.addEventListener("input", onChange);
      input.addEventListener("change", onChange);
      // Lets the reset button (and any future programmatic edit) push a value
      // into both the live DOM input and state.current in one call.
      state.applyValue = (value) => {
        state.current = value;
        if (state.type === "bool") {
          input.checked = !!value;
        } else {
          input.value = value === null || value === undefined ? "" : String(value);
        }
      };
      return input;
    }

    // Two-group reorder-and-toggle widget for `browse.top_level` (and any
    // future array-valued key with a `choices` catalog).
    //
    // - Enabled list = state.current, rendered in saved order. Drag any row
    //   to reorder; uncheck to hide. Drop position is decided by whether the
    //   pointer is in the top or bottom half of the target row, so the same
    //   gesture can move items up, down, or to the very end.
    // - Disabled list = catalog choices not in state.current, in catalog
    //   order. Check to append to the bottom of the enabled list.
    // - IDs in state.current that aren't in the catalog ("unknown") render
    //   with their raw ID and a warning style — unchecking is the cure.
    function buildArrayControl(state, entry) {
      const wrap = document.createElement("div");
      wrap.className = "array-control";

      const labelById = new Map(entry.choices.map((c) => [c.id, c.label]));

      // dragstart fires before we read state.current in handlers, so we
      // stash the source index on the widget itself rather than relying on
      // dataTransfer (Firefox requires non-empty dataTransfer.setData, but
      // round-tripping through it is more fragile than this closure).
      let dragFromIdx = null;

      function clearDropHints() {
        wrap.querySelectorAll(".array-item.drop-before, .array-item.drop-after").forEach((el) => {
          el.classList.remove("drop-before", "drop-after");
        });
      }

      function render() {
        wrap.innerHTML = "";

        const enabled = state.current.slice();
        const enabledSet = new Set(enabled);

        const enabledLabel = document.createElement("div");
        enabledLabel.className = "array-group-label";
        enabledLabel.textContent = "Visible — uncheck to hide";
        wrap.appendChild(enabledLabel);

        const enabledList = document.createElement("div");
        enabledList.className = "array-list";
        if (enabled.length === 0) {
          const empty = document.createElement("div");
          empty.className = "array-empty";
          empty.textContent = "(none — root will be empty)";
          enabledList.appendChild(empty);
        }
        enabled.forEach((id, idx) => {
          const known = labelById.has(id);
          const item = document.createElement("div");
          item.className = "array-item draggable" + (known ? "" : " unknown");
          item.draggable = true;

          const handle = document.createElement("span");
          handle.className = "drag-handle";
          handle.textContent = "⠿";
          handle.title = "drag to reorder";
          item.appendChild(handle);

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = true;
          cb.draggable = false;
          cb.addEventListener("change", () => {
            state.current = state.current.filter((x) => x !== id);
            render();
            refreshDirty();
          });
          item.appendChild(cb);

          const labelSpan = document.createElement("span");
          labelSpan.className = "array-item-label";
          labelSpan.textContent = known ? labelById.get(id) : `${id} (unknown)`;
          item.appendChild(labelSpan);

          item.addEventListener("dragstart", (ev) => {
            dragFromIdx = idx;
            item.classList.add("dragging");
            // Firefox requires setData to actually start a drag.
            ev.dataTransfer.effectAllowed = "move";
            ev.dataTransfer.setData("text/plain", String(idx));
          });
          item.addEventListener("dragend", () => {
            dragFromIdx = null;
            item.classList.remove("dragging");
            clearDropHints();
          });
          item.addEventListener("dragover", (ev) => {
            if (dragFromIdx === null) return;
            ev.preventDefault();
            ev.dataTransfer.dropEffect = "move";
            const rect = item.getBoundingClientRect();
            const before = ev.clientY < rect.top + rect.height / 2;
            clearDropHints();
            item.classList.add(before ? "drop-before" : "drop-after");
          });
          item.addEventListener("dragleave", () => {
            item.classList.remove("drop-before", "drop-after");
          });
          item.addEventListener("drop", (ev) => {
            if (dragFromIdx === null) return;
            ev.preventDefault();
            const before = item.classList.contains("drop-before");
            const from = dragFromIdx;
            const to = idx + (before ? 0 : 1);
            // Skip no-op moves (dropping on the source's own zones).
            if (from === to || from === to - 1) {
              clearDropHints();
              return;
            }
            const next = state.current.slice();
            const [moved] = next.splice(from, 1);
            next.splice(from < to ? to - 1 : to, 0, moved);
            state.current = next;
            render();
            refreshDirty();
          });

          // ↑/↓ buttons — touch-friendly reorder. Drag-and-drop is the
          // desktop power-user shortcut; these are the primary path on
          // mobile (and a keyboard-accessible path everywhere).
          const moveBtns = document.createElement("div");
          moveBtns.className = "move-btns";
          const moveBy = (delta) => {
            const target = idx + delta;
            if (target < 0 || target >= enabled.length) return;
            const next = state.current.slice();
            [next[idx], next[target]] = [next[target], next[idx]];
            state.current = next;
            render();
            refreshDirty();
          };
          const upBtn = document.createElement("button");
          upBtn.type = "button";
          upBtn.className = "move-btn";
          upBtn.textContent = "↑";
          upBtn.title = "move up";
          upBtn.disabled = idx === 0;
          upBtn.addEventListener("click", () => moveBy(-1));
          moveBtns.appendChild(upBtn);
          const downBtn = document.createElement("button");
          downBtn.type = "button";
          downBtn.className = "move-btn";
          downBtn.textContent = "↓";
          downBtn.title = "move down";
          downBtn.disabled = idx === enabled.length - 1;
          downBtn.addEventListener("click", () => moveBy(1));
          moveBtns.appendChild(downBtn);
          // The move buttons must not initiate a drag of the parent row.
          moveBtns.draggable = false;
          moveBtns.addEventListener("mousedown", (ev) => ev.stopPropagation());
          item.appendChild(moveBtns);

          enabledList.appendChild(item);
        });
        wrap.appendChild(enabledList);

        const disabled = entry.choices.filter((c) => !enabledSet.has(c.id));
        if (disabled.length > 0) {
          // Hidden section gets its own visually-distinct sub-area inside
          // the array-control box. The CSS gives it a subtle tint + a
          // top border so the divide is clear without a literal <hr>.
          const hiddenWrap = document.createElement("div");
          hiddenWrap.className = "array-section-hidden";

          const disabledLabel = document.createElement("div");
          disabledLabel.className = "array-group-label";
          disabledLabel.textContent = "Hidden (check to show)";
          hiddenWrap.appendChild(disabledLabel);

          const disabledList = document.createElement("div");
          disabledList.className = "array-list";
          disabled.forEach((choice) => {
            const item = document.createElement("div");
            item.className = "array-item";

            // Empty span keeps grid alignment with the draggable rows above.
            item.appendChild(document.createElement("span"));

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.checked = false;
            cb.addEventListener("change", () => {
              state.current = state.current.concat([choice.id]);
              render();
              refreshDirty();
            });
            item.appendChild(cb);

            const labelSpan = document.createElement("span");
            labelSpan.className = "array-item-label";
            labelSpan.textContent = choice.label;
            item.appendChild(labelSpan);

            disabledList.appendChild(item);
          });
          hiddenWrap.appendChild(disabledList);
          wrap.appendChild(hiddenWrap);
        }
      }

      // Counterpart to buildScalarInput's applyValue. Reset uses this to
      // push the default array back into the widget.
      state.applyValue = (value) => {
        state.current = Array.isArray(value) ? value.slice() : [];
        render();
      };

      render();
      return wrap;
    }

    function renderSettings(entries) {
      const form = document.getElementById("settings-form");
      form.innerHTML = "";
      settingsState.clear();

      // Group by section (the part before the first dot).
      const sections = new Map();
      for (const e of entries) {
        const section = e.key.split(".")[0];
        if (!sections.has(section)) sections.set(section, []);
        sections.get(section).push(e);
      }

      for (const [section, items] of sections) {
        const sec = document.createElement("div");
        sec.className = "settings-section";
        const h3 = document.createElement("h3");
        h3.textContent = sectionTitle(section);
        sec.appendChild(h3);

        for (const e of items) {
          const type = inferType(e);

          const row = document.createElement("div");
          row.className = "settings-row";
          if (type === "array") row.classList.add("row-array");
          if (e.source === "user") row.classList.add("user-source");

          const keyDiv = document.createElement("div");
          keyDiv.className = "settings-key";
          const dot = document.createElement("span");
          dot.className = "modified-dot";
          dot.title = "modified from default";
          keyDiv.appendChild(dot);
          keyDiv.appendChild(document.createTextNode(e.label || e.key));
          row.appendChild(keyDiv);

          const state = {
            key: e.key,
            initial: e.value,
            current: type === "array" && Array.isArray(e.value) ? e.value.slice() : e.value,
            default: e.default,
            source: e.source,
            type,
            row,
          };
          settingsState.set(e.key, state);

          const control =
            type === "array" ? buildArrayControl(state, e) : buildScalarInput(state, e);
          row.appendChild(control);

          const resetBtn = document.createElement("button");
          resetBtn.className = "reset-link";
          resetBtn.textContent = "↺ default";
          resetBtn.title = "revert to default (apply on Save)";
          // Local-only edit: bring the input back to its default value and
          // mark the row dirty. Save commits the change to the server
          // (DELETE if the row reverts to default, POST otherwise).
          resetBtn.addEventListener("click", () => {
            const newValue =
              type === "array" && Array.isArray(state.default)
                ? state.default.slice()
                : state.default;
            state.applyValue(newValue);
            refreshDirty();
          });
          state.resetBtn = resetBtn;
          row.appendChild(resetBtn);

          const tier = tierNote(e.restart_required);
          if (e.description || tier) {
            const hintDiv = document.createElement("div");
            hintDiv.className = "settings-hint";
            if (e.description) hintDiv.appendChild(document.createTextNode(e.description));
            if (tier) {
              const note = document.createElement("span");
              // tier-${value} picks the severity color (reload=warning, restart=danger).
              note.className = `tier-note tier-${e.restart_required}`;
              note.textContent = tier;
              hintDiv.appendChild(note);
            }
            row.appendChild(hintDiv);
          }

          sec.appendChild(row);
        }
        form.appendChild(sec);
      }
      refreshDirty();
    }

    async function fetchSettings() {
      const status = document.getElementById("settings-status");
      try {
        const resp = await fetch("/admin/config");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const entries = await resp.json();
        renderSettings(entries);
        status.textContent = "";
        status.classList.remove("error");
      } catch (e) {
        const form = document.getElementById("settings-form");
        form.textContent = `failed to load: ${e.message}`;
        status.textContent = "";
        status.classList.add("error");
      }
    }

    async function saveSettings() {
      const status = document.getElementById("settings-status");
      const btn = document.getElementById("btn-save-settings");
      // A dirty row whose new value equals the default is a revert — send
      // DELETE so the server drops the override (source returns to "default").
      // Otherwise POST to set the new override.
      const toUpdate = {};
      const toReset = [];
      for (const state of settingsState.values()) {
        if (valueEqual(state.current, state.initial)) continue;
        if (valueEqual(state.current, state.default)) {
          toReset.push(state.key);
        } else {
          toUpdate[state.key] = state.current;
        }
      }
      if (toReset.length === 0 && Object.keys(toUpdate).length === 0) return;
      btn.disabled = true;
      status.textContent = "saving…";
      status.classList.remove("error");
      try {
        if (Object.keys(toUpdate).length > 0) {
          const resp = await fetch("/admin/config", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(toUpdate),
          });
          if (!resp.ok) {
            const body = await resp.text();
            throw new Error(`HTTP ${resp.status}: ${body}`);
          }
        }
        for (const key of toReset) {
          const resp = await fetch(`/admin/config/${encodeURIComponent(key)}`, {
            method: "DELETE",
          });
          if (!resp.ok) {
            const body = await resp.text();
            throw new Error(`HTTP ${resp.status}: ${body}`);
          }
        }
        status.textContent = "saved";
        await fetchSettings();
      } catch (e) {
        status.textContent = `save failed: ${e.message}`;
        status.classList.add("error");
        btn.disabled = false;
      }
    }

    document.getElementById("btn-save-settings").addEventListener("click", saveSettings);

    // Initial fetch + start polling.
    fetchStats();
    fetchSettings();
    setInterval(fetchStats, POLL_INTERVAL_MS);
  </script>
</body>
</html>
